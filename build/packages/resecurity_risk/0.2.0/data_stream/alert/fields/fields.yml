- name: resecurity.alert
  type: group
  fields:
    - name: id
      type: long
      description: Resecurity's internal alert ID.
    - name: subject
      type: keyword
      description: Alert subject line.
    - name: content
      type: text
      description: Alert body content (may contain HTML markup).
    - name: category.id
      type: long
      description: Alert category ID.
    - name: category.name
      type: keyword
      description: Alert category name, e.g. "Threat Actor".
    - name: confidence_score
      type: long
      description: "Confidence score: 0=Low, 1=Moderate, 2=High."
    - name: tlp_status
      type: keyword
      description: Traffic Light Protocol status (Green, Yellow, or Red).
    - name: geography
      type: keyword
      description: Country codes the alert is related to.
    - name: threat_actors
      type: keyword
      description: Names of threat actors associated with the alert.
    - name: tags
      type: keyword
      description: Vendor-supplied tags for the alert.
    - name: for_splunk.email
      type: keyword
      description: Email addresses associated with the alert (for_splunk field group).
    - name: ioc
      type: flattened
      description: Embedded indicator of compromise object, if the alert references one. See the IOC data stream for the equivalent standalone schema.
    - name: ttp
      type: flattened
      description: Embedded CAPEC-style tactics/techniques/procedures object(s), if present. Schema is vendor-defined and varies per entry.
