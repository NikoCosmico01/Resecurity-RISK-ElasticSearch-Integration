- name: resecurity.dark_web
  type: group
  fields:
    - name: id
      type: long
      description: Resecurity's internal post ID.
    - name: actor
      type: keyword
      description: Name of the actor who posted.
    - name: category
      type: keyword
      description: Category name for the post.
    - name: country
      type: keyword
      description: Two-letter country code (ISO 3166-1) associated with the post.
    - name: language
      type: keyword
      description: Two-letter language code (ISO 639-1) of the post.
    - name: post
      type: text
      description: Full post body text.
    - name: snippet
      type: text
      description: Short snippet/excerpt of the post.
    - name: title
      type: keyword
      description: Post title.
    - name: resource_name
      type: keyword
      description: Name of the resource (forum/site/channel) the post came from.
    - name: source
      type: keyword
      description: 'Source type, e.g. "Dark Web", "Telegram", "Twitter".'
    - name: url
      type: keyword
      description: URL of the post, if available.
