- name: resecurity.breach
  type: group
  fields:
    - name: id
      type: long
      description: Resecurity's internal breach record ID.
    - name: username
      type: keyword
      description: Leaked username.
    - name: email
      type: keyword
      description: Leaked email address.
    - name: password
      type: keyword
      description: Leaked plaintext password, if available. Sensitive — restrict access to this field's index accordingly.
    - name: password_hash
      type: keyword
      description: Leaked password hash, if available.
    - name: salt
      type: keyword
      description: Password salt, if available.
    - name: ip
      type: ip
      description: IP address associated with the leaked record, if available.
    - name: info
      type: flattened
      description: Additional source-specific fields. Schema varies per breach source (vendor-defined).
    - name: source_id
      type: long
      description: ID of the breach source.
    - name: source.id
      type: long
      description: Breach source ID (duplicate of source_id, as returned by the API).
    - name: source.name
      type: keyword
      description: Breach source name.
    - name: source.category
      type: keyword
      description: Breach source category, e.g. "Blog".
    - name: source.description
      type: text
      description: Breach source description.
    - name: source.url
      type: keyword
      description: URL where the breach source was found.
    - name: source.attack_vector
      type: keyword
      description: Attack vector used to obtain the breach, if known.
    - name: source.actor_name
      type: keyword
      description: Threat actor associated with the breach source.
    - name: source.accounts
      type: long
      description: Total number of accounts in the breach source.
    - name: source.score
      type: long
      description: Breach source severity score (0-100).
    - name: source.geography
      type: keyword
      description: Countries associated with the breach source.
    - name: source.compromised_data
      type: keyword
      description: Categories of compromised data, e.g. "Bank account numbers".
    - name: source.meta
      type: keyword
      description: Additional free-text metadata tags for the breach source.
    - name: source.is_imported
      type: boolean
      description: Whether the breach source has been fully imported.
    - name: source.add_date
      type: date
      description: Timestamp the breach source was added.
    - name: source.collect_date
      type: date
      description: Timestamp the breach source was collected.
    - name: source.ttp
      type: flattened
      description: Exploit/technique detail associated with the breach source (author, platform, port, etc). Schema is vendor-defined.
