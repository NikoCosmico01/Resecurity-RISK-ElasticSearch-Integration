---
processors:
  - set:
      field: event.kind
      value: enrichment
  - set:
      field: event.category
      value: [threat]
  - set:
      field: event.type
      value: [indicator]
  - set:
      field: event.dataset
      value: resecurity_risk.breach
  - fingerprint:
      fields:
        - id
      target_field: _id
      if: ctx.id != null
      ignore_missing: true
  - date:
      field: source.collect_date
      target_field: '@timestamp'
      formats:
        - UNIX
      if: ctx.source != null && ctx.source.collect_date != null
      ignore_failure: true
  - date:
      field: source.add_date
      target_field: '@timestamp'
      formats:
        - UNIX
      if: ctx['@timestamp'] == null && ctx.source != null && ctx.source.add_date != null
      ignore_failure: true
  - rename:
      field: id
      target_field: resecurity.breach.id
      ignore_missing: true
  - rename:
      field: username
      target_field: resecurity.breach.username
      ignore_missing: true
  - rename:
      field: email
      target_field: resecurity.breach.email
      ignore_missing: true
  - set:
      field: user.email
      copy_from: resecurity.breach.email
      if: ctx.resecurity?.breach?.email != null
  - rename:
      field: password
      target_field: resecurity.breach.password
      ignore_missing: true
  - rename:
      field: password_hash
      target_field: resecurity.breach.password_hash
      ignore_missing: true
  - rename:
      field: salt
      target_field: resecurity.breach.salt
      ignore_missing: true
  - rename:
      field: ip
      target_field: resecurity.breach.ip
      ignore_missing: true
  - append:
      field: related.ip
      value: "{{{resecurity.breach.ip}}}"
      if: ctx.resecurity?.breach?.ip != null
      allow_duplicates: false
  - rename:
      field: info
      target_field: resecurity.breach.info
      ignore_missing: true
  - rename:
      field: source_id
      target_field: resecurity.breach.source_id
      ignore_missing: true
  - rename:
      field: source.id
      target_field: resecurity.breach.source.id
      ignore_missing: true
  - rename:
      field: source.name
      target_field: resecurity.breach.source.name
      ignore_missing: true
  - rename:
      field: source.category
      target_field: resecurity.breach.source.category
      ignore_missing: true
  - rename:
      field: source.description
      target_field: resecurity.breach.source.description
      ignore_missing: true
  - rename:
      field: source.url
      target_field: resecurity.breach.source.url
      ignore_missing: true
  - rename:
      field: source.attack_vector
      target_field: resecurity.breach.source.attack_vector
      ignore_missing: true
  - rename:
      field: source.actor_name
      target_field: resecurity.breach.source.actor_name
      ignore_missing: true
  - rename:
      field: source.accounts
      target_field: resecurity.breach.source.accounts
      ignore_missing: true
  - rename:
      field: source.score
      target_field: resecurity.breach.source.score
      ignore_missing: true
  - rename:
      field: source.geography
      target_field: resecurity.breach.source.geography
      ignore_missing: true
  - rename:
      field: source.compromised_data
      target_field: resecurity.breach.source.compromised_data
      ignore_missing: true
  - rename:
      field: source.meta
      target_field: resecurity.breach.source.meta
      ignore_missing: true
  - convert:
      field: source.is_imported
      target_field: resecurity.breach.source.is_imported
      type: boolean
      if: ctx.source != null && ctx.source.is_imported != null
      ignore_missing: true
      ignore_failure: true
  - date:
      field: source.add_date
      target_field: resecurity.breach.source.add_date
      formats:
        - UNIX
      if: ctx.source != null && ctx.source.add_date != null
      ignore_failure: true
  - date:
      field: source.collect_date
      target_field: resecurity.breach.source.collect_date
      formats:
        - UNIX
      if: ctx.source != null && ctx.source.collect_date != null
      ignore_failure: true
  - rename:
      field: source.ttp
      target_field: resecurity.breach.source.ttp
      ignore_missing: true
  - remove:
      field: source
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: "{{{ _ingest.on_failure_message }}}"
  - set:
      field: event.kind
      value: pipeline_error
