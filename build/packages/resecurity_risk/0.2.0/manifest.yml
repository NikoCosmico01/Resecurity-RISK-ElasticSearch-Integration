format_version: 3.0.2
name: resecurity_risk
title: "Resecurity RISK"
version: 0.2.0
description: "Collect Threat Intelligence Alerts, Indicators of Compromise, Data Breaches, and Dark Web mentions from the Resecurity RISK REST API."
type: integration
categories:
  - threat_intel
conditions:
  kibana:
    version: ">=8.13.0"
icons:
  - src: /img/logo.png
    title: "Resecurity logo"
    size: "128x128"
    type: "image/png"
policy_templates:
  - name: risk
    title: "Resecurity RISK"
    description: "Collect Alerts, IOCs, Breaches, and Dark Web data from the Resecurity RISK API."
    inputs:
      - type: cel
        title: "Collect Resecurity RISK data over HTTP"
        description: "Requires a Resecurity RISK API key."
        vars:
          - name: url
            type: text
            title: "Resecurity API base URL"
            multi: false
            required: true
            show_user: true
            default: "https://app.resecurity.com/api"
          - name: api_key
            type: password
            title: "API key"
            description: "Resecurity RISK API key. Sent as the Basic-auth username; the password is left Blank."
            multi: false
            required: true
            secret: true
            show_user: true
owner:
  github: NikoCosmico01
  type: community
