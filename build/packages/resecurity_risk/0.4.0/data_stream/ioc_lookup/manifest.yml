title: "Resecurity IOC Lookup"
type: logs
dataset: resecurity_risk.ioc_lookup
streams:
  - input: cel
    template_path: cel.yml.hbs
    title: "Look Up Resecurity IOCs by Hash"
    description: "Look Up Indicators of Compromise by MD5/SHA256 hash against the Resecurity RISK API (watchlist enrichment)."
    enabled: false
    vars:
      - name: hashes
        type: text
        title: "Hashes to Look Up"
        description: "List of MD5 or SHA256 hashes to look up on every poll. Each hash is queried against /ioc/search-by-hash."
        multi: true
        required: true
        show_user: true
      - name: interval
        type: text
        title: "Collection Interval"
        default: "24h"
        required: true
        show_user: true
