- version: "0.4.0"
  changes:
    - description: "Add IOC Lookup data stream covering GET /ioc/search-by-hash (watchlist enrichment by MD5/SHA256)."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/1
    - description: "Restore ISO8601 date format support alongside UNIX in all ingest pipelines."
      type: bugfix
      link: https://github.com/elastic/integrations/pull/1
    - description: "Fix CEL state handling: carry api_key/query/max_pages across evaluations and restart pagination each interval; previously collection stopped after the first poll or first API error."
      type: bugfix
      link: https://github.com/elastic/integrations/pull/1
    - description: "Fix alert pipeline: trim/append on arrays used wrong foreach syntax, mustache-rendered arrays produced garbage in tags and related.ip, and updated_at/empty category were left in the document."
      type: bugfix
      link: https://github.com/elastic/integrations/pull/1
- version: "0.3.0"
  changes:
    - description: "Integration Works, Added Logo and Alternative URL."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/1
- version: "0.2.0"
  changes:
    - description: "Extend Kibana Compatibility to include the 9.x line (kibana.version: >=8.13.0), verified against Kibana 9.4.3."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/1
- version: "0.1.0"
  changes:
    - description: "Initial Release with Alert, IOC, Breach, and Dark Web data streams."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/1
