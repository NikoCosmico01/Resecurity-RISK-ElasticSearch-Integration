---
processors:
  - set:
      field: event.kind
      value: enrichment
  - set:
      field: event.category
      value: [threat]
  - set:
      field: event.type
      value: [indicator]
  - set:
      field: event.dataset
      value: resecurity_risk.dark_web
  - fingerprint:
      fields:
        - id
      target_field: _id
      if: ctx.id != null
      ignore_missing: true
  - date:
      field: timestamp
      target_field: '@timestamp'
      formats:
        - ISO8601
        - UNIX
      if: ctx.timestamp != null
      ignore_failure: true
  - rename:
      field: id
      target_field: resecurity.dark_web.id
      ignore_missing: true
  - rename:
      field: actor
      target_field: resecurity.dark_web.actor
      ignore_missing: true
  - rename:
      field: category
      target_field: resecurity.dark_web.category
      ignore_missing: true
  - rename:
      field: country
      target_field: resecurity.dark_web.country
      ignore_missing: true
  - rename:
      field: language
      target_field: resecurity.dark_web.language
      ignore_missing: true
  - rename:
      field: post
      target_field: resecurity.dark_web.post
      ignore_missing: true
  - rename:
      field: snippet
      target_field: resecurity.dark_web.snippet
      ignore_missing: true
  - rename:
      field: title
      target_field: resecurity.dark_web.title
      ignore_missing: true
  - rename:
      field: resource_name
      target_field: resecurity.dark_web.resource_name
      ignore_missing: true
  - rename:
      field: source
      target_field: resecurity.dark_web.source
      ignore_missing: true
  - rename:
      field: url
      target_field: resecurity.dark_web.url
      ignore_missing: true
  - remove:
      field: timestamp
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: "{{{ _ingest.on_failure_message }}}"
  - set:
      field: event.kind
      value: pipeline_error
