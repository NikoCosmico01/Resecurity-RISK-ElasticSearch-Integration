title: "Resecurity IOC"
type: logs
dataset: resecurity_risk.ioc
streams:
  - input: cel
    template_path: cel.yml.hbs
    title: "Collect Resecurity IOCs"
    description: "Collect indicators of compromise from the Resecurity RISK API."
    vars:
      - name: interval
        type: text
        title: "Collection interval"
        default: "1h"
        required: true
        show_user: true
      - name: max_pages_per_poll
        type: integer
        title: "Max pages per poll"
        description: "The IOC API has no incremental/date filter, so each poll re-walks pages from the start. This bounds how many pages are fetched per interval."
        default: 10
        required: true
        show_user: true
