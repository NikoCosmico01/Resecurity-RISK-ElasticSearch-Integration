- name: resecurity.ioc
  type: group
  fields:
    - name: hash_query
      type: keyword
      description: The MD5/SHA256 hash that was looked up.
    - name: found
      type: boolean
      description: Whether the hash was found in the Resecurity IOC database.
    - name: id
      type: long
      description: Resecurity's internal IOC ID.
    - name: actor_name
      type: keyword
      description: Threat actor associated with the IOC.
    - name: malware_name
      type: keyword
      description: Malware family/name.
    - name: file_name
      type: keyword
      description: File name observed.
    - name: file_type
      type: keyword
      description: File type observed, e.g. "Win32 EXE".
    - name: detection_ratio
      type: keyword
      description: 'Antivirus detection ratio, e.g. "52 / 58".'
    - name: item_url
      type: keyword
      description: Link to the IOC record on the Resecurity portal.
    - name: add_date
      type: date
      description: Timestamp the IOC was added.
    - name: analysis_date
      type: date
      description: Timestamp the IOC was analyzed.
    - name: update_date
      type: date
      description: Timestamp the IOC was last updated.
